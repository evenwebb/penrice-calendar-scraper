name: Update iCal Feed

on:
  schedule:
    - cron: "0 11 * * *"
  workflow_dispatch:

concurrency:
  group: penrice-scrape-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  issues: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      CREATE_FAILURE_ISSUE: ${{ secrets.CREATE_FAILURE_ISSUE || 'true' }}
      SCRAPER_RUN_ATTEMPTS: ${{ secrets.SCRAPER_RUN_ATTEMPTS || '2' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: requirements.txt

      - name: Install dependencies
        env:
          UV_SYSTEM_PYTHON: 1
        run: uv pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        run: pytest tests/ -q

      - name: Generate iCal (with retries)
        run: |
          mkdir -p logs
          set -o pipefail
          ATTEMPTS="${SCRAPER_RUN_ATTEMPTS:-2}"
          if [ "$ATTEMPTS" -lt 1 ]; then ATTEMPTS=1; fi
          attempt=1
          while [ "$attempt" -le "$ATTEMPTS" ]; do
            echo "Scraper attempt $attempt/$ATTEMPTS"
            if python generate_ics.py 2>&1 | tee logs/scraper.log; then
              echo "Scraper completed successfully"
              exit 0
            fi
            if [ "$attempt" -lt "$ATTEMPTS" ]; then
              sleep_seconds=$((attempt * 20))
              echo "Attempt $attempt failed; retrying in ${sleep_seconds}s..."
              sleep "$sleep_seconds"
            fi
            attempt=$((attempt + 1))
          done
          echo "All scraper attempts failed"
          exit 1

      - name: Commit and push iCal file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -f penrice.ics ]; then git add penrice.ics; fi
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Update iCal file"
          git push

      - name: Upload failure logs artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-failure-logs-${{ github.run_id }}
          retention-days: 7
          path: logs/
          if-no-files-found: ignore

      - name: Create or update failure issue
        if: failure() && env.CREATE_FAILURE_ISSUE == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const run = require('./.github/scripts/create-failure-issue.js');
            return await run({github, context});

      - name: Auto-close stale failure issue after 2 successful runs
        if: success() && env.CREATE_FAILURE_ISSUE == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const run = require('./.github/scripts/auto-close-failure-issue.js');
            return await run({github, context});
